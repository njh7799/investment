name: Update market data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: update-market-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run tests
        run: python -m pytest --quiet

      - name: Update CSV files
        run: python scripts/update_market_data.py --mode daily

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- assets/IXIC.csv assets/QQQ.csv assets/TQQQ.csv; then
            echo "Market data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/IXIC.csv assets/QQQ.csv assets/TQQQ.csv
          market_date=$(TZ=America/New_York date +%F)
          git commit -m "Update market data ${market_date}"
          git push
